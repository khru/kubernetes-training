<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="700" viewBox="0 0 1200 700" role="img" aria-labelledby="title desc">
  <title id="title">Fundamentos, DevEx y entorno reproducible</title>
  <desc id="desc">Mapa de conceptos: de codigo a procesos y Kubernetes</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0b1220"/>
      <stop offset="100%" stop-color="#111827"/>
    </linearGradient>
    <marker id="arrow" markerWidth="8" markerHeight="8" refX="7" refY="4" orient="auto">
      <path d="M0,0 L8,4 L0,8 z" fill="#93c5fd"/>
    </marker>
    <style>
      .title { font: 700 30px 'JetBrains Mono', monospace; fill: #e5e7eb; }
      .subtitle { font: 400 16px 'JetBrains Mono', monospace; fill: #93c5fd; }
      .box { fill: #1f2937; stroke: #60a5fa; stroke-width: 2; rx: 12; }
      .box2 { fill: #1f2937; stroke: #34d399; stroke-width: 2; rx: 12; }
      .box3 { fill: #1f2937; stroke: #f59e0b; stroke-width: 2; rx: 12; }
      .label { font: 600 16px 'JetBrains Mono', monospace; fill: #f9fafb; }
      .small { font: 400 13px 'JetBrains Mono', monospace; fill: #d1d5db; }
      .line { stroke: #93c5fd; stroke-width: 2.5; marker-end: url(#arrow); }
      .line2 { stroke: #34d399; stroke-width: 2.5; marker-end: url(#arrow); }
      .line3 { stroke: #f59e0b; stroke-width: 2.5; marker-end: url(#arrow); }
    </style>
  </defs>

  <rect x="0" y="0" width="1200" height="700" fill="url(#bg)"/>

  <text x="60" y="70" class="title">Seccion 0: Fundamentos + DevEx + entorno reproducible</text>
  <text x="60" y="100" class="subtitle">Antes de Kubernetes, entender procesos, red, configuracion, logs y datos estructurados</text>

  <rect x="70" y="170" width="220" height="90" class="box"/>
  <text x="95" y="205" class="label">Codigo fuente</text>
  <text x="95" y="230" class="small">checkout-api</text>

  <rect x="360" y="170" width="220" height="90" class="box2"/>
  <text x="395" y="205" class="label">Proceso vivo</text>
  <text x="395" y="230" class="small">PID, señales, salida</text>

  <rect x="650" y="170" width="220" height="90" class="box2"/>
  <text x="675" y="205" class="label">Interfaz y estado</text>
  <text x="675" y="230" class="small">puerto, /health, /ready</text>

  <rect x="940" y="170" width="220" height="90" class="box3"/>
  <text x="970" y="205" class="label">Kubernetes</text>
  <text x="970" y="230" class="small">orquesta contenedores</text>

  <line x1="290" y1="215" x2="360" y2="215" class="line"/>
  <line x1="580" y1="215" x2="650" y2="215" class="line2"/>
  <line x1="870" y1="215" x2="940" y2="215" class="line3"/>

  <rect x="80" y="330" width="330" height="300" class="box"/>
  <text x="105" y="365" class="label">Fundamentos tecnicos</text>
  <text x="105" y="395" class="small">- procesos y PID</text>
  <text x="105" y="420" class="small">- SIGTERM vs SIGKILL</text>
  <text x="105" y="445" class="small">- puertos, TCP, HTTP</text>
  <text x="105" y="470" class="small">- DNS y nombres estables</text>
  <text x="105" y="495" class="small">- variables de entorno</text>
  <text x="105" y="520" class="small">- logs con contexto</text>

  <rect x="435" y="330" width="330" height="300" class="box2"/>
  <text x="460" y="365" class="label">DevEx y herramientas</text>
  <text x="460" y="395" class="small">- curl, ps, ss, tail, grep</text>
  <text x="460" y="420" class="small">- jq para JSON</text>
  <text x="460" y="445" class="small">- yq para YAML</text>
  <text x="460" y="470" class="small">- Taskfile para repetir tareas</text>
  <text x="460" y="495" class="small">- Git para versionar el laboratorio</text>
  <text x="460" y="520" class="small">- criterios de salida claros</text>

  <rect x="790" y="330" width="330" height="300" class="box3"/>
  <text x="815" y="365" class="label">Entorno reproducible</text>
  <text x="815" y="395" class="small">kubernetes-learning-lab/</text>
  <text x="815" y="420" class="small">apps/ docs/ scripts/ Taskfile.yml</text>
  <text x="815" y="445" class="small">doctor + inspect + smoke</text>
  <text x="815" y="470" class="small">misma ejecucion, mismos pasos</text>
  <text x="815" y="495" class="small">menos friccion accidental</text>
  <text x="815" y="520" class="small">base para secciones siguientes</text>

  <line x1="580" y1="260" x2="250" y2="330" class="line"/>
  <line x1="610" y1="260" x2="600" y2="330" class="line2"/>
  <line x1="640" y1="260" x2="955" y2="330" class="line3"/>
</svg>
