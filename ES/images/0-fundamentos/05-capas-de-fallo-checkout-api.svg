<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="680" viewBox="0 0 1200 680" role="img" aria-labelledby="t d">
  <title id="t">Capas de fallo en checkout-api</title>
  <desc id="d">Checklist de diagnostico desde imagen a aplicacion</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0b1220"/>
      <stop offset="100%" stop-color="#111827"/>
    </linearGradient>
    <style>
      .h { font: 700 28px 'JetBrains Mono', monospace; fill: #f3f4f6; }
      .s { font: 400 14px 'JetBrains Mono', monospace; fill: #93c5fd; }
      .col { fill: #111827; stroke: #60a5fa; stroke-width: 2; rx: 12; }
      .row { fill: #1f2937; stroke: #475569; stroke-width: 1.2; rx: 8; }
      .t { font: 600 14px 'JetBrains Mono', monospace; fill: #f9fafb; }
      .m { font: 400 13px 'JetBrains Mono', monospace; fill: #d1d5db; }
    </style>
  </defs>
  <rect width="1200" height="680" fill="url(#bg)"/>
  <text x="56" y="58" class="h">Por que esta seccion existe: diagnostico por capas</text>
  <text x="56" y="86" class="s">Si checkout-api no arranca, el fallo puede estar en imagen, proceso, red, dependencias o configuracion</text>

  <rect x="56" y="126" width="1088" height="500" class="col"/>

  <rect x="86" y="160" width="1028" height="52" class="row"/>
  <text x="108" y="192" class="t">1) Imagen: existe y es accesible?</text>

  <rect x="86" y="222" width="1028" height="52" class="row"/>
  <text x="108" y="254" class="t">2) Proceso: arranca y se mantiene vivo?</text>

  <rect x="86" y="284" width="1028" height="52" class="row"/>
  <text x="108" y="316" class="t">3) Puerto: escucha donde esperas?</text>

  <rect x="86" y="346" width="1028" height="52" class="row"/>
  <text x="108" y="378" class="t">4) Configuracion: faltan env vars, configmap o secret?</text>

  <rect x="86" y="408" width="1028" height="52" class="row"/>
  <text x="108" y="440" class="t">5) Readiness: la probe apunta a ruta correcta?</text>

  <rect x="86" y="470" width="1028" height="52" class="row"/>
  <text x="108" y="502" class="t">6) Red y DNS: resuelve postgres y conecta?</text>

  <rect x="86" y="532" width="1028" height="70" class="row"/>
  <text x="108" y="564" class="t">7) Dependencias y app: PostgreSQL acepta conexiones? Service selecciona Pods?</text>
  <text x="108" y="588" class="m">Kubernetes da senales; el razonamiento operativo lo pone el equipo</text>
</svg>
