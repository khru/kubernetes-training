<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="520" viewBox="0 0 1200 520" role="img" aria-labelledby="t d">
  <title id="t">SIGTERM y SIGKILL</title>
  <desc id="d">Comparacion entre apagado graceful y kill inmediato</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0b1220"/>
      <stop offset="100%" stop-color="#111827"/>
    </linearGradient>
    <marker id="a" markerWidth="8" markerHeight="8" refX="7" refY="4" orient="auto">
      <path d="M0,0 L8,4 L0,8 z" fill="#93c5fd"/>
    </marker>
    <style>
      .h { font: 700 28px 'JetBrains Mono', monospace; fill: #f3f4f6; }
      .s { font: 600 16px 'JetBrains Mono', monospace; fill: #cbd5e1; }
      .b1 { fill: #1f2937; stroke: #34d399; stroke-width: 2; rx: 12; }
      .b2 { fill: #1f2937; stroke: #f87171; stroke-width: 2; rx: 12; }
      .t1 { font: 600 15px 'JetBrains Mono', monospace; fill: #f9fafb; }
      .t2 { font: 400 13px 'JetBrains Mono', monospace; fill: #d1d5db; }
      .ok { stroke: #34d399; stroke-width: 2.2; marker-end: url(#a); }
      .bad { stroke: #f87171; stroke-width: 2.2; marker-end: url(#a); }
    </style>
  </defs>
  <rect width="1200" height="520" fill="url(#bg)"/>
  <text x="60" y="62" class="h">SIGTERM vs SIGKILL en checkout-api</text>
  <text x="60" y="92" class="s">Kubernetes necesita apps que apaguen bien durante rollouts y drains</text>

  <rect x="60" y="130" width="520" height="330" class="b1"/>
  <text x="90" y="165" class="t1">Camino recomendado: graceful shutdown</text>
  <text x="90" y="205" class="t2">1) kill -TERM PID</text>
  <text x="90" y="235" class="t2">2) proceso recibe SIGTERM</text>
  <text x="90" y="265" class="t2">3) cierra conexiones</text>
  <text x="90" y="295" class="t2">4) termina trabajo en curso</text>
  <text x="90" y="325" class="t2">5) libera recursos y sale con Exit 0</text>
  <text x="90" y="375" class="t2">Resultado: menos errores y menos perdida de peticiones</text>

  <rect x="620" y="130" width="520" height="330" class="b2"/>
  <text x="650" y="165" class="t1">Camino agresivo: terminacion inmediata</text>
  <text x="650" y="205" class="t2">1) kill -KILL PID</text>
  <text x="650" y="235" class="t2">2) proceso recibe SIGKILL</text>
  <text x="650" y="265" class="t2">3) termina de inmediato</text>
  <text x="650" y="295" class="t2">4) no hay cleanup</text>
  <text x="650" y="325" class="t2">5) puede dejar trabajo incompleto</text>
  <text x="650" y="375" class="t2">Resultado: util en emergencia, malo como rutina</text>

  <line x1="360" y1="220" x2="545" y2="220" class="ok"/>
  <line x1="840" y1="220" x2="655" y2="220" class="bad"/>
</svg>
