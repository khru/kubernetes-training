<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="620" viewBox="0 0 1200 620" role="img" aria-labelledby="t d">
  <title id="t">Ciclo de vida de una imagen</title>
  <desc id="d">Desde Dockerfile hasta uso en otras maquinas y Kubernetes</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1"><stop offset="0%" stop-color="#0b1220"/><stop offset="100%" stop-color="#111827"/></linearGradient>
    <marker id="a" markerWidth="8" markerHeight="8" refX="7" refY="4" orient="auto"><path d="M0,0 L8,4 L0,8 z" fill="#93c5fd"/></marker>
    <style>
      .h{font:700 28px 'JetBrains Mono',monospace;fill:#f3f4f6}.s{font:400 14px 'JetBrains Mono',monospace;fill:#93c5fd}
      .b{fill:#111827;stroke:#60a5fa;stroke-width:2;rx:10}.t{font:600 13px 'JetBrains Mono',monospace;fill:#f9fafb}
      .l{stroke:#93c5fd;stroke-width:2.1;marker-end:url(#a)}
    </style>
  </defs>
  <rect width="1200" height="620" fill="url(#bg)"/>
  <text x="54" y="56" class="h">Lifecycle de imagen en el laboratorio</text>
  <text x="54" y="84" class="s">build, test, tag, push, pull, run</text>

  <rect x="70" y="160" width="140" height="70" class="b"/><text x="98" y="202" class="t">Codigo</text>
  <rect x="240" y="160" width="160" height="70" class="b"/><text x="267" y="202" class="t">Dockerfile</text>
  <rect x="430" y="160" width="130" height="70" class="b"/><text x="462" y="202" class="t">Build</text>
  <rect x="590" y="160" width="170" height="70" class="b"/><text x="617" y="202" class="t">Imagen local</text>
  <rect x="790" y="160" width="120" height="70" class="b"/><text x="820" y="202" class="t">Run</text>
  <rect x="940" y="160" width="180" height="70" class="b"/><text x="968" y="202" class="t">Smoke test</text>

  <line x1="210" y1="195" x2="240" y2="195" class="l"/>
  <line x1="400" y1="195" x2="430" y2="195" class="l"/>
  <line x1="560" y1="195" x2="590" y2="195" class="l"/>
  <line x1="760" y1="195" x2="790" y2="195" class="l"/>
  <line x1="910" y1="195" x2="940" y2="195" class="l"/>

  <rect x="260" y="320" width="200" height="70" class="b"/><text x="290" y="362" class="t">Tag 1.0.0 / dev</text>
  <rect x="500" y="320" width="170" height="70" class="b"/><text x="532" y="362" class="t">Push registry</text>
  <rect x="710" y="320" width="150" height="70" class="b"/><text x="742" y="362" class="t">Pull</text>
  <rect x="900" y="320" width="220" height="70" class="b"/><text x="925" y="362" class="t">Run en otra maquina</text>

  <line x1="675" y1="230" x2="360" y2="320" class="l"/>
  <line x1="460" y1="355" x2="500" y2="355" class="l"/>
  <line x1="670" y1="355" x2="710" y2="355" class="l"/>
  <line x1="860" y1="355" x2="900" y2="355" class="l"/>

  <rect x="70" y="450" width="1050" height="120" class="b"/>
  <text x="95" y="490" class="t">Punto pedagogico: tag es legible para humanos; digest fija contenido exacto</text>
  <text x="95" y="520" class="t">En practicas: tags explicitos. En despliegues serios: preferencia por digest para evitar ambiguedad.</text>
</svg>
