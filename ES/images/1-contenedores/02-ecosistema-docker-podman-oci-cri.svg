<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="680" viewBox="0 0 1200 680" role="img" aria-labelledby="t d">
  <title id="t">Docker Podman OCI y CRI</title>
  <desc id="d">Relacion entre herramientas, estandares y ejecucion en Kubernetes</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1"><stop offset="0%" stop-color="#0b1220"/><stop offset="100%" stop-color="#111827"/></linearGradient>
    <marker id="a" markerWidth="8" markerHeight="8" refX="7" refY="4" orient="auto"><path d="M0,0 L8,4 L0,8 z" fill="#93c5fd"/></marker>
    <style>
      .h{font:700 28px 'JetBrains Mono',monospace;fill:#f3f4f6}.s{font:400 14px 'JetBrains Mono',monospace;fill:#93c5fd}
      .b1{fill:#111827;stroke:#60a5fa;stroke-width:2;rx:12}.b2{fill:#111827;stroke:#34d399;stroke-width:2;rx:12}.b3{fill:#111827;stroke:#f59e0b;stroke-width:2;rx:12}
      .t{font:600 15px 'JetBrains Mono',monospace;fill:#f9fafb}.m{font:400 13px 'JetBrains Mono',monospace;fill:#cbd5e1}
      .l{stroke:#93c5fd;stroke-width:2.2;marker-end:url(#a)}
    </style>
  </defs>
  <rect width="1200" height="680" fill="url(#bg)"/>
  <text x="56" y="56" class="h">Herramientas vs estandares vs runtime</text>
  <text x="56" y="84" class="s">Docker y Podman son herramientas; OCI y CRI explican interoperabilidad</text>

  <rect x="70" y="130" width="220" height="90" class="b1"/><text x="95" y="165" class="t">Docker CLI</text><text x="95" y="188" class="m">build / run / push</text>
  <rect x="70" y="250" width="220" height="90" class="b1"/><text x="95" y="285" class="t">Podman CLI</text><text x="95" y="308" class="m">build / run / pod</text>

  <rect x="370" y="190" width="280" height="120" class="b2"/><text x="395" y="230" class="t">Imagen OCI</text><text x="395" y="255" class="m">formato estandar</text><text x="395" y="278" class="m">registrable y portable</text>

  <rect x="730" y="130" width="190" height="90" class="b3"/><text x="755" y="165" class="t">Registry</text><text x="755" y="188" class="m">push / pull</text>
  <rect x="730" y="250" width="190" height="90" class="b3"/><text x="755" y="285" class="t">Runtime</text><text x="755" y="308" class="m">containerd / CRI-O</text>

  <rect x="980" y="160" width="170" height="150" class="b1"/><text x="1005" y="195" class="t">Kubernetes</text><text x="1005" y="220" class="m">kubelet</text><text x="1005" y="245" class="m">CRI</text><text x="1005" y="270" class="m">nodos</text>

  <line x1="290" y1="175" x2="370" y2="230" class="l"/>
  <line x1="290" y1="295" x2="370" y2="270" class="l"/>
  <line x1="650" y1="220" x2="730" y2="175" class="l"/>
  <line x1="650" y1="280" x2="730" y2="295" class="l"/>
  <line x1="920" y1="295" x2="980" y2="250" class="l"/>

  <rect x="70" y="400" width="1080" height="220" class="b2"/>
  <text x="96" y="438" class="t">Lectura clave del modulo</text>
  <text x="96" y="466" class="m">- aprender contenedores no es aprender solo Docker</text>
  <text x="96" y="492" class="m">- OCI permite que imagenes y runtimes hablen un lenguaje comun</text>
  <text x="96" y="518" class="m">- Kubernetes no ejecuta docker run; kubelet delega via CRI</text>
  <text x="96" y="544" class="m">- si entiendes el modelo, cambias de herramienta sin reaprender conceptos base</text>
</svg>
